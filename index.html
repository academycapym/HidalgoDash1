                { q: "Si el ABD rechaza por NIP incorrecto, ¿dónde se corrige?", options: ["En el módulo de Reinyección.", "En un Trámite Nuevo.", "En Soporte.", "En Ajustes."], ans: 0 },
                { q: "¿Qué significa el estatus 'Rechazo por Donador'?", options: ["Compañía anterior bloqueó la salida.", "Movistar no aceptó.", "NIP mal escrito.", "Falta señal."], ans: 0 },

            ],
            VENTAS: [
                { q: "¿Cuál es el objetivo principal de la Venta Consultiva?", options: ["Indagar necesidades reales para dar la mejor solución.", "Vender lo más caro.", "Hablar mucho.", "Despachar rápido."], ans: 0 },
                { q: "¿Cuál es la diferencia entre Característica y Beneficio?", options: ["Característica es técnica y Beneficio es la utilidad.", "Son lo mismo.", "Característica es precio.", "Beneficio es regalo."], ans: 0 },
                { q: "¿Para qué se utilizan las Preguntas Abiertas?", options: ["Para obtener información detallada del cliente.", "Para respuestas 'Sí/No'.", "Para confundir.", "Para saber presupuesto."], ans: 0 },
                { q: "¿Cómo actuar ante una objeción de 'Está muy caro'?", options: ["Empatizar y resaltar el valor y ahorro futuro.", "Ignorar.", "Enojarse.", "Bajar precio."], ans: 0 },
                { q: "Si el cliente pregunta: '¿Qué necesito?', estamos ante:", options: ["Una Señal de Compra clara.", "Una objeción oculta.", "Duda sobre marca.", "Distracción."], ans: 0 },
                { q: "¿Qué es el Cierre de Ventas?", options: ["La acción directa que concreta el trato.", "Dar la bolsa.", "Llenar Ónix.", "Saludar al siguiente."], ans: 0 },
                { q: "Si logramos que lleve un plan superior al buscado, hicimos:", options: ["Up-Selling.", "Cross-Selling.", "Venta Perdida.", "Servicio Cliente."], ans: 0 },
                { q: "Si ofrecemos protector y audífonos, hicimos:", options: ["Cross-Selling.", "Up-Selling.", "Portabilidad.", "Sondeo."], ans: 0 },
                { q: "La Escucha Activa requiere primordialmente:", options: ["Mantener contacto visual y parafrasear.", "Revisar celular.", "Interrumpir.", "Mirar fuera."], ans: 0 },
                { q: "¿Cuál es el objetivo de 'Romper el Hielo'?", options: ["Generar empatía y bajar defensas.", "Saber su dinero.", "Presumir specs.", "Reírse."], ans: 0 },
                { q: "¿Técnica efectiva ante el 'Lo voy a pensar'?", options: ["Preguntar qué duda específica tiene.", "Decir que se acaba mañana.", "Dejar que se vaya.", "Enojarse."], ans: 0 },
                { q: "¿Qué significa Vender Valor en lugar de Precio?", options: ["Resaltar cómo el producto mejora su vida.", "Dar menor precio.", "Regalar cosas.", "Hablar de historia."], ans: 0 },
                { q: "¿Por qué es vital el Seguimiento Post-Venta?", options: ["Para fidelizar y pedir referidos.", "Cobrar deudas.", "Ver competencia.", "Nada."], ans: 0 },
                { q: "Brazo cruzado y sin sonrisa transmite:", options: ["Falta de interés y barrera.", "Profesionalismo.", "Concentración.", "Autoridad."], ans: 0 },
                { q: "Si un cliente llega molesto por un error previo:", options: ["Mantener la calma y buscar solución.", "Culpar a otro.", "Ignorarlo.", "Seguridad."], ans: 0 }
            ]
        };

        const App = () => {
            const [view, setView] = useState("LOGIN");
            const [userRole, setUserRole] = useState("");
            const [userId, setUserId] = useState("");
            const [pass, setPass] = useState("");
            const [activeTab, setActiveTab] = useState("OPERACION");
            
            const [dataTEMM, setDataTEMM] = useState([]);
            const [dataINV, setDataINV] = useState([]);
            const [ranking, setRanking] = useState([]);
            const [history, setHistory] = useState([]);
            const [resources, setResources] = useState([]);
            const [loading, setLoading] = useState(true);

            const [supFilter, setSupFilter] = useState("TODOS");
            const [cadFilter, setCadFilter] = useState("TODAS");

            const [subTabAcademia, setSubTabAcademia] = useState("EXAMENES");
            const [quizState, setQuizState] = useState('MENU');
            const [colaboradorName, setColaboradorName] = useState("");
            const [questions, setQuestions] = useState([]);
            const [curQ, setCurQ] = useState(0);
            const [answers, setAnswers] = useState([]);
            const [timer, setTimer] = useState(180);
            const [curType, setCurType] = useState('');

            // AL MONTAR: OCULTAMOS EL LOADER INICIAL
            useEffect(() => {
                const loader = document.getElementById('loading-screen');
                if (loader) loader.style.display = 'none';
                
                auth.signInAnonymously().catch(e => console.log("Firebase Auth error"));

                const unsubOp = db.collection("operacion").onSnapshot(snap => {
                    snap.forEach(doc => {
                        if (doc.id === "temm") setDataTEMM(doc.data().list || []);
                        if (doc.id === "inv") setDataINV(doc.data().list || []);
                    });
                    setLoading(false);
                });

                const unsubRank = db.collection("ranking").orderBy("score", "desc").onSnapshot(s => setRanking(s.docs.map(d=>({id:d.id, ...d.data()}))));
                const unsubHist = db.collection("historicos").orderBy("fecha", "desc").onSnapshot(s => setHistory(s.docs.map(d=>({id:d.id, ...d.data()}))));
                const unsubRepo = db.collection("recurso").onSnapshot(s => setResources(s.docs.map(d=>({id:d.id, ...d.data()}))));

                return () => { unsubOp(); unsubRank(); unsubHist(); unsubRepo(); };
            }, []);

            useEffect(() => {
                let t = null;
                if (quizState === 'PLAY' && timer > 0) t = setInterval(() => setTimer(v => v - 1), 1000);
                else if (quizState === 'PLAY' && timer === 0) setQuizState('RESULT');
                return () => clearInterval(t);
            }, [quizState, timer]);

            const handleLogin = (e) => {
                e.preventDefault();
                const u = userId.trim().toUpperCase();
                if (u === "ADMIN" && pass === "2024") { setUserRole("ADMIN"); setView("APP"); }
                else if (pass === "Movistar1" && u.length >= 4) { setUserRole("PROMOTOR"); setView("APP"); }
                else { alert("Usuario o Contraseña incorrectos."); }
            };

            const uploadFile = async (type, e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = async (evt) => {
                    const wb = XLSX.read(evt.target.result, { type: 'binary' });
                    const sheetKey = type === "temm" ? "seg diario" : "tiendas";
                    const wsName = wb.SheetNames.find(n => n.toLowerCase().includes(sheetKey));
                    if (!wsName) return alert(`Pestaña '${sheetKey}' no encontrada.`);
                    const json = XLSX.utils.sheet_to_json(wb.Sheets[wsName], { header: "A", defval: "" });
                    let list = [];
                    if (type === "temm") {
                        list = json.filter(r => r["J"] && String(r["J"]).length > 3).map(r => ({
                            id: String(r["I"] || "").trim().replace(/^0+/, ''),
                            tienda: String(r["J"]).trim(),
                            sup: String(r["B"]).trim(),
                            cad: String(r["L"]).toUpperCase().includes("EKT") ? "ELEKTRA" : (String(r["L"]).toUpperCase().includes("COPPEL") ? "COPPEL" : "SUBURBIA"),
                            altas: Math.round(r["Q"] || 0), cuota: Math.round(r["R"] || 0), gap: Math.round(r["S"] || 0)
                        }));
                    } else {
                        list = json.filter(r => r["I"] && String(r["I"]).length > 3).map(r => ({
                            id: String(r["I"] || "").trim().replace(/^0+/, ''),
                            mod: String(r["T"] || "").trim(), mar: String(r["U"] || "").trim(), q: parseInt(r["AG"] || 0)
                        }));
                    }
                    await db.collection("operacion").doc(type).set({ list });
                    alert("¡Nube HidalgoDash Sincronizada!");
                };
                reader.readAsBinaryString(file);
            };

            const startQuiz = (type) => {
                if (!colaboradorName.trim()) return alert("Nombre completo obligatorio.");
                setCurType(type);
                const shuffled = [...EXAMS_DATA[type]].sort(() => 0.5 - Math.random()).map(q => ({
                    ...q, options: q.options.map((o, i) => ({ t: o, isC: i === q.ans })).sort(() => 0.5 - Math.random())
                }));
                setQuestions(shuffled); setCurQ(0); setAnswers([]); setTimer(180); setQuizState('PLAY');
            };

            const handleAns = (isC) => {
                const nextA = [...answers, isC]; setAnswers(nextA);
                if (curQ + 1 < questions.length) setCurQ(v => v + 1);
                else setQuizState('RESULT');
            };

            const score = answers.filter(Boolean).length;
            const passed = score >= Math.ceil(questions.length * 0.8);
            const pts = (score * 5) + (passed ? timer : 0);

            const downloadCert = (name, module, date, supervisor) => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
                doc.setDrawColor(1, 157, 244); doc.setLineWidth(2); doc.rect(10, 10, 277, 190);
                doc.setFont("helvetica", "bold"); doc.setFontSize(38); doc.setTextColor(11, 39, 57);
                doc.text("CERTIFICADO NACIONAL", 148, 50, { align: 'center' });
                doc.setFontSize(18); doc.setFont("helvetica", "normal");
                doc.text("HidalgoDash CAPYM otorga el presente a:", 148, 70, { align: 'center' });
                doc.setFontSize(32); doc.setFont("helvetica", "bold"); doc.setTextColor(92, 182, 21);
                doc.text(name.toUpperCase(), 148, 95, { align: 'center' });
                doc.setFontSize(16); doc.setTextColor(11, 39, 57);
                doc.text(`Por acreditar el módulo: ${module}`, 148, 115, { align: 'center' });
                doc.setFontSize(12); doc.text(`Fecha: ${date}`, 148, 140, { align: 'center' });
                doc.line(50, 175, 120, 175); doc.text(supervisor || "SUPERVISOR", 85, 182, { align: 'center' });
                doc.line(177, 175, 247, 175); doc.text("C.P. ANGEL ROIZ", 212, 182, { align: 'center' });
                doc.save(`Certificado_${name}.pdf`);
            };

            useEffect(() => {
                if(quizState === 'RESULT' && passed) {
                    const name = colaboradorName.trim().toUpperCase();
                    const logId = userId.trim().toUpperCase();
                    const sName = userRole === "ADMIN" ? "ADMIN" : (dataTEMM.find(d => d.id === userId.trim().replace(/^0+/, ''))?.sup || "SUPERVISOR");
                    db.collection("historicos").add({ idpdv: logId, nombre: name, examen: curType, puntos: pts, sup: sName, fecha: firebase.firestore.FieldValue.serverTimestamp() });
                    db.collection("ranking").where("name", "==", name).get().then
